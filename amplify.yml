version: 1
backend:
  phases:
    build:
      commands:
        - npm install --legacy-peer-deps
        - npx ampx pipeline-deploy --branch main --app-id d2zaokzgxwci43
frontend:
  phases:
    preBuild:
      commands:
        - npm install --legacy-peer-deps
        - npx ampx generate outputs --branch main --app-id d2zaokzgxwci43
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
